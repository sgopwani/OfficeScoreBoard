<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Basketball Scoreboard</title>
    <link rel="stylesheet" href="./ScoreBoard.css">
    <script src="./ScoreBoard.js" defer></script>
</head>

<body>

    <h1 id="Title">🏀 Office Basketball Scoreboard</h1>

    <div class="controls">
        <button onclick="addGame()">+ Add Game</button>
        <button onclick="addPlayer()">+ Add Player</button>
        <button onclick="clearGame()">🗑 Clear</button>
    </div>

    <p class="label">Select a Game:</p>
    <div id="gameButtons"></div>

    <p class="label">Select Players:</p>
    <div id="playerButtons"></div>

    <p><button id="createBoard" onclick="buildScoreboard()">Create Scoreboard</button></p>

    <div id="scoreboard"></div>

</body>

</html>
